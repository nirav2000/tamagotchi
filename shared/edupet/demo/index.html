<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPet Next Demo</title>
    <link rel="stylesheet" href="../edupet.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        background: #f4f7ff;
        color: #1e2655;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
      }

      .hero {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 18px;
        align-items: start;
      }

      .card {
        border: 1px solid #d8defd;
        border-radius: 18px;
        background: white;
        padding: 16px;
        box-shadow: 0 10px 26px rgba(43, 57, 119, 0.08);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0 0;
      }

      .controls button,
      .controls select,
      .stack button {
        border: 1px solid #cbd4ff;
        background: white;
        border-radius: 999px;
        padding: 9px 12px;
        cursor: pointer;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      textarea, pre {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d8defd;
        border-radius: 14px;
        background: #f8faff;
        padding: 14px;
      }

      textarea {
        min-height: 130px;
        font-family: monospace;
      }

      pre {
        min-height: 260px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .minor {
        color: #5d6794;
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>EduPet next-pass demo</h1>
      <p class="minor">A more Tamagotchi-like pass with a visible pet, stat bars, gentle decay, anti-grind logic, and import/export tools.</p>

      <div class="hero">
        <section class="card">
          <div id="petMount"></div>
        </section>

        <div class="stack">
          <section class="card">
            <h2>Simulate app events</h2>
            <label for="appSelect">Current app</label>
            <div class="controls">
              <select id="appSelect">
                <option value="reading-app">reading-app</option>
                <option value="spelling-app">spelling-app</option>
                <option value="maths-app">maths-app</option>
                <option value="demo-app">demo-app</option>
              </select>
            </div>
            <div class="controls" id="eventButtons"></div>
          </section>

          <section class="card">
            <h2>State tools</h2>
            <div class="controls">
              <button id="resetState" type="button">Reset</button>
              <button id="exportState" type="button">Export</button>
              <button id="importState" type="button">Import</button>
            </div>
            <textarea id="stateTransfer" placeholder="Exported JSON appears here. Paste JSON here to import."></textarea>
          </section>

          <section class="card">
            <h2>Live state</h2>
            <pre id="stateView"></pre>
          </section>
        </div>
      </div>
    </main>

    <script src="../edupet-config.js"></script>
    <script src="../edupet-storage.js"></script>
    <script src="../edupet-core.js"></script>
    <script src="../edupet-ui.js"></script>
    <script>
      (function () {
        var EVENTS = [
          'session_start',
          'session_end',
          'task_completed',
          'retry_attempt',
          'improvement_made',
          'focus_minute',
          'feed_pet',
          'tidy_room',
          'encourage_pet',
          'play_with_pet'
        ];

        function selectedApp() {
          return document.getElementById('appSelect').value;
        }

        function refreshStateView() {
          document.getElementById('stateView').textContent = JSON.stringify(window.EduPet.getState(), null, 2);
        }

        function setupEventButtons() {
          var wrap = document.getElementById('eventButtons');
          EVENTS.forEach(function (eventName) {
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = eventName;
            btn.addEventListener('click', function () {
              window.EduPet.recordEvent({
                type: eventName,
                appId: selectedApp(),
                value: 1
              });
            });
            wrap.appendChild(btn);
          });
        }

        window.EduPet.mount(document.getElementById('petMount'));
        setupEventButtons();
        refreshStateView();
        window.EduPet.onChange(refreshStateView);

        document.getElementById('resetState').addEventListener('click', function () {
          window.EduPet.reset();
        });

        document.getElementById('exportState').addEventListener('click', function () {
          document.getElementById('stateTransfer').value = window.EduPet.exportState();
        });

        document.getElementById('importState').addEventListener('click', function () {
          var raw = document.getElementById('stateTransfer').value.trim();
          if (!raw) return;
          if (!window.EduPet.importState(raw)) {
            alert('Import failed. Check the JSON.');
          }
        });
      })();
    </script>
  </body>
</html>
